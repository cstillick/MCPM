{% extends "base.html" %}
{% block title %}Sign In — ACT Predictions{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-16">
  <div class="bg-k-surface rounded-2xl border border-k-border shadow-card p-8">
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">🏎️</div>
      <h1 class="text-2xl font-bold text-k-text">ACT Predictions</h1>
      <p class="text-k-sub text-sm mt-1">Sign in to place your bets</p>
    </div>

    {% if error %}
      <div class="bg-k-no/5 border border-k-no/30 rounded-lg px-4 py-3 mb-5 text-sm text-k-no">
        {{ error }}
      </div>
    {% endif %}

    <form method="post" action="/login" class="space-y-4">
      <div>
        <label class="block text-xs font-semibold text-k-sub mb-1 uppercase tracking-wider">Username</label>
        <input type="text" name="username" required autofocus
               class="w-full bg-k-bg border border-k-border text-k-text rounded-lg px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-k-accent/30 focus:border-k-accent transition-colors"
               placeholder="Enter your username" />
      </div>
      <div>
        <label class="block text-xs font-semibold text-k-sub mb-1 uppercase tracking-wider">Password</label>
        <input type="password" name="password" required
               class="w-full bg-k-bg border border-k-border text-k-text rounded-lg px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-k-accent/30 focus:border-k-accent transition-colors"
               placeholder="Enter your password" />
      </div>
      <button type="submit"
              class="w-full bg-k-accent text-white font-semibold py-2.5 rounded-lg hover:bg-indigo-600 transition-colors">
        Sign In
      </button>
    </form>

    <p class="text-center text-sm text-k-sub mt-5">
      Don't have an account? <a href="/register" class="text-k-accent font-semibold hover:underline">Request access</a>
    </p>
  </div>
</div>
{% endblock %}
