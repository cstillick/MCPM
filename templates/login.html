{% extends "base.html" %}
{% block title %}Login — ACT Predictions{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-16">
  <div class="bg-mk-surface rounded-xl border border-mk-border p-8">
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">🏎️</div>
      <h1 class="text-2xl font-extrabold text-mk-text tracking-[0.05em]">ACT PREDICTIONS</h1>
      <p class="text-mk-sub text-sm mt-1">Sign in to place your bets</p>
    </div>

    {% if error %}
      <div class="border-l-4 border-mk-red bg-mk-bg px-4 py-3 rounded-r mb-5 text-sm text-mk-text">
        {{ error }}
      </div>
    {% endif %}

    <form method="post" action="/login" class="space-y-4">
      <div>
        <label class="block text-xs font-semibold text-mk-sub mb-1 uppercase tracking-widest">Username</label>
        <input
          type="text"
          name="username"
          required
          autofocus
          class="w-full bg-mk-bg border border-mk-border text-mk-text rounded-lg px-3 py-2 focus:outline-none focus:ring-1 focus:ring-mk-amber focus:border-mk-amber transition-colors"
          placeholder="Enter your username"
        />
      </div>
      <div>
        <label class="block text-xs font-semibold text-mk-sub mb-1 uppercase tracking-widest">Password</label>
        <input
          type="password"
          name="password"
          required
          class="w-full bg-mk-bg border border-mk-border text-mk-text rounded-lg px-3 py-2 focus:outline-none focus:ring-1 focus:ring-mk-amber focus:border-mk-amber transition-colors"
          placeholder="Enter your password"
        />
      </div>
      <button
        type="submit"
        class="w-full bg-mk-amber text-[#0A0A0B] font-bold py-2.5 rounded-lg hover:opacity-90 transition-opacity tracking-wide"
      >
        Sign In
      </button>
    </form>

    <p class="text-center text-sm text-mk-sub mt-5">
      Don't have an account? <a href="/register" class="text-mk-amber font-semibold hover:opacity-80 transition-opacity">Request access</a>
    </p>
  </div>
</div>
{% endblock %}
