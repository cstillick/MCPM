{% extends "base.html" %}
{% block title %}Login — MK Predictions{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-16">
  <div class="bg-white rounded-2xl shadow-lg p-8">
    <div class="text-center mb-6">
      <div class="text-5xl mb-2">🏎️</div>
      <h1 class="text-2xl font-extrabold text-gray-800">MK Predictions</h1>
      <p class="text-gray-500 text-sm mt-1">Sign in to place your bets</p>
    </div>

    {% if error %}
      <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4 text-sm">
        {{ error }}
      </div>
    {% endif %}

    <form method="post" action="/login" class="space-y-4">
<div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
        <input
          type="text"
          name="username"
          required
          autofocus
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-red-500"
          placeholder="Enter your username"
        />
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
        <input
          type="password"
          name="password"
          required
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-red-500"
          placeholder="Enter your password"
        />
      </div>
      <button
        type="submit"
        class="w-full mk-red mk-red-hover text-white font-bold py-2 rounded-lg transition"
      >
        Sign In
      </button>
    </form>
  </div>
</div>
{% endblock %}
