{% extends "base.html" %}
{% block title %}Create Game — Admin{% endblock %}

{% block content %}
<div class="flex items-center gap-4 mb-6">
  <a href="/admin" class="text-sm text-mk-sub hover:text-mk-text transition-colors">&larr; Dashboard</a>
  <h1 class="text-2xl font-extrabold text-mk-text tracking-[0.05em]">🏁 Create Game</h1>
</div>

{% if not players %}
  <div class="border-l-4 border-mk-amber bg-mk-surface px-4 py-3 rounded-r mb-6 text-sm text-mk-text">
    No players found. <a href="/admin/elo-import" class="font-bold text-mk-amber">Import player data</a> first.
  </div>
{% endif %}

<form method="post" action="/admin/games/create" x-data="gameForm()" class="space-y-6">
  <!-- Game name -->
  <div class="bg-mk-surface rounded-xl border border-mk-border p-5">
    <label class="block text-xs font-semibold text-mk-sub mb-2 uppercase tracking-widest">Game Name</label>
    <input type="text" name="game_name" required placeholder="e.g. Friday Night Session #12"
           class="w-full bg-mk-bg border border-mk-border text-mk-text rounded-lg px-3 py-2 focus:outline-none focus:ring-1 focus:ring-mk-amber focus:border-mk-amber" />
  </div>

  <!-- 4 Teams -->
  {% for i in range(1, 5) %}
    <div class="bg-mk-surface rounded-xl border border-mk-border p-5">
      <h3 class="font-bold text-mk-text mb-4 text-sm uppercase tracking-widest">Team {{ i }}</h3>
      <div class="grid sm:grid-cols-3 gap-4">
        <div>
          <label class="block text-xs font-semibold text-mk-sub mb-1 uppercase tracking-widest">Team Name</label>
          <input type="text" name="team{{ i }}_name" required placeholder="e.g. Red Shell"
                 class="w-full bg-mk-bg border border-mk-border text-mk-text rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-mk-amber focus:border-mk-amber" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-mk-sub mb-1 uppercase tracking-widest">Player 1</label>
          <select name="team{{ i }}_p1" required
                  class="w-full bg-mk-bg border border-mk-border text-mk-text rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-mk-amber focus:border-mk-amber">
            <option value="">— Select player —</option>
            {% for player in players %}
              <option value="{{ player.id }}">{{ player.name }} ({{ player.elo | round(0) | int }})</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold text-mk-sub mb-1 uppercase tracking-widest">Player 2</label>
          <select name="team{{ i }}_p2" required
                  class="w-full bg-mk-bg border border-mk-border text-mk-text rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-mk-amber focus:border-mk-amber">
            <option value="">— Select player —</option>
            {% for player in players %}
              <option value="{{ player.id }}">{{ player.name }} ({{ player.elo | round(0) | int }})</option>
            {% endfor %}
          </select>
        </div>
      </div>
    </div>
  {% endfor %}

  <div class="flex gap-3">
    <button type="submit"
            class="bg-mk-amber text-[#0A0A0B] font-bold px-6 py-3 rounded-xl hover:opacity-90 transition-opacity">
      Create Game &amp; Open Betting
    </button>
    <a href="/admin" class="bg-mk-surface border border-mk-border text-mk-text font-bold px-6 py-3 rounded-xl hover:border-mk-sub transition-colors">
      Cancel
    </a>
  </div>
</form>

<script>
function gameForm() {
  return {};
}
</script>
{% endblock %}
