{% extends "base.html" %}
{% block title %}Create Game — Admin{% endblock %}

{% block content %}
<div class="flex items-center gap-4 mb-6">
  <a href="/admin" class="text-sm text-gray-400 hover:text-gray-600">&larr; Dashboard</a>
  <h1 class="text-2xl font-extrabold text-gray-800">🏁 Create Game</h1>
</div>

{% if not players %}
  <div class="bg-yellow-50 border border-yellow-300 text-yellow-800 rounded-lg p-4 mb-6">
    No players found. <a href="/admin/elo-import" class="font-bold underline">Import player data</a> first.
  </div>
{% endif %}

<form method="post" action="/admin/games/create" x-data="gameForm()" class="space-y-6">
  <!-- Game name -->
  <div class="bg-white rounded-xl shadow p-5">
    <label class="block text-sm font-semibold text-gray-700 mb-2">Game Name</label>
    <input type="text" name="game_name" required placeholder="e.g. Friday Night Session #12"
           class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-red-400" />
  </div>

  <!-- 4 Teams -->
  {% for i in range(1, 5) %}
    <div class="bg-white rounded-xl shadow p-5">
      <h3 class="font-bold text-gray-700 mb-4">Team {{ i }}</h3>
      <div class="grid sm:grid-cols-3 gap-4">
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1">Team Name</label>
          <input type="text" name="team{{ i }}_name" required placeholder="e.g. Red Shell"
                 class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-400" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1">Player 1</label>
          <select name="team{{ i }}_p1" required
                  class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-400">
            <option value="">— Select player —</option>
            {% for player in players %}
              <option value="{{ player.id }}">{{ player.name }} ({{ player.elo | round(0) | int }})</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1">Player 2</label>
          <select name="team{{ i }}_p2" required
                  class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-400">
            <option value="">— Select player —</option>
            {% for player in players %}
              <option value="{{ player.id }}">{{ player.name }} ({{ player.elo | round(0) | int }})</option>
            {% endfor %}
          </select>
        </div>
      </div>
    </div>
  {% endfor %}

  <div class="flex gap-3">
    <button type="submit"
            class="mk-red mk-red-hover text-white font-bold px-6 py-3 rounded-xl shadow transition">
      Create Game &amp; Open Betting
    </button>
    <a href="/admin" class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold px-6 py-3 rounded-xl transition">
      Cancel
    </a>
  </div>
</form>

<script>
function gameForm() {
  return {};
}
</script>
{% endblock %}
