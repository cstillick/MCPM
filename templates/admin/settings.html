{% extends "base.html" %}
{% block title %}Admin Settings — ACT Predictions{% endblock %}

{% block content %}
<div class="flex items-center gap-3 mb-6">
  <a href="/admin" class="text-k-sub hover:text-k-text transition-colors text-sm">← Admin</a>
  <h1 class="text-2xl font-bold text-k-text">Site Settings</h1>
</div>

<div class="max-w-lg">
  <form method="post" action="/admin/settings">
    <div class="bg-k-surface rounded-xl border border-k-border shadow-card p-5 space-y-5">

      <!-- P2P Betting Toggle -->
      <div class="flex items-start justify-between gap-4">
        <div>
          <p class="font-semibold text-k-text">P2P Betting Exchange</p>
          <p class="text-sm text-k-sub mt-0.5">Allow users to create and join peer-to-peer bets on game outcomes and races.</p>
        </div>
        <label class="flex items-center cursor-pointer shrink-0">
          <input type="checkbox" name="p2p_betting_enabled" value="on"
                 {% if settings and settings.p2p_betting_enabled %}checked{% endif %}
                 class="sr-only peer">
          <div class="relative w-11 h-6 bg-k-border rounded-full peer
                      peer-checked:bg-k-accent
                      after:content-[''] after:absolute after:top-[2px] after:left-[2px]
                      after:bg-white after:rounded-full after:h-5 after:w-5
                      after:transition-all peer-checked:after:translate-x-5"></div>
        </label>
      </div>

      <div class="border-t border-k-border pt-4">
        <button type="submit"
                class="bg-k-accent text-white font-semibold px-5 py-2 rounded-lg hover:bg-indigo-600 transition-colors text-sm">
          Save Settings
        </button>
      </div>
    </div>
  </form>
</div>
{% endblock %}
