{% extends "base.html" %}
{% block title %}Create Game{% endblock %}

{% block content %}
<div class="flex items-center gap-4 mb-6">
  <a href="/" class="text-sm text-k-sub hover:text-k-text transition-colors">&larr; Markets</a>
  <h1 class="text-2xl font-bold text-k-text">Create Game</h1>
</div>

{% if not players %}
  <div class="bg-amber-50 border border-amber-200 rounded-lg px-4 py-3 mb-6 text-sm text-amber-700">
    No players found. Check back later or contact an admin.
  </div>
{% endif %}

<form method="post" action="/games/create" class="space-y-4">
  <div class="bg-k-surface rounded-xl border border-k-border shadow-card p-5">
    <label class="block text-xs font-semibold text-k-sub mb-2 uppercase tracking-wider">Game Name</label>
    <input type="text" name="game_name" required placeholder="e.g. Friday Night Session #12"
           class="w-full bg-k-bg border border-k-border text-k-text rounded-lg px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-k-accent/30 focus:border-k-accent" />
  </div>

  {% for i in range(1, 5) %}
    <div class="bg-k-surface rounded-xl border border-k-border shadow-card p-5">
      <h3 class="font-semibold text-k-text mb-4 text-sm uppercase tracking-wider">Team {{ i }}</h3>
      <div class="grid sm:grid-cols-3 gap-4">
        <div>
          <label class="block text-xs font-semibold text-k-sub mb-1 uppercase tracking-wider">Team Name</label>
          <input type="text" name="team{{ i }}_name" required placeholder="e.g. Red Shell"
                 class="w-full bg-k-bg border border-k-border text-k-text rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-k-accent/30 focus:border-k-accent" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-k-sub mb-1 uppercase tracking-wider">Player 1</label>
          <select name="team{{ i }}_p1" required
                  class="w-full bg-k-bg border border-k-border text-k-text rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-k-accent/30 focus:border-k-accent">
            <option value="">— Select player —</option>
            {% for player in players %}
              <option value="{{ player.id }}">{{ player.name }} ({{ player.elo | round(0) | int }})</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold text-k-sub mb-1 uppercase tracking-wider">Player 2</label>
          <select name="team{{ i }}_p2" required
                  class="w-full bg-k-bg border border-k-border text-k-text rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-k-accent/30 focus:border-k-accent">
            <option value="">— Select player —</option>
            {% for player in players %}
              <option value="{{ player.id }}">{{ player.name }} ({{ player.elo | round(0) | int }})</option>
            {% endfor %}
          </select>
        </div>
      </div>
    </div>
  {% endfor %}

  <div class="flex gap-3">
    <button type="submit"
            class="bg-k-accent text-white font-semibold px-6 py-3 rounded-xl hover:bg-indigo-600 transition-colors">
      Create Game
    </button>
    <a href="/" class="bg-k-surface border border-k-border text-k-text font-semibold px-6 py-3 rounded-xl hover:border-k-sub transition-colors">
      Cancel
    </a>
  </div>
</form>
{% endblock %}
